worker_processes 1;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    resolver 1.1.1.1 valid=30s;
    proxy_temp_path /tmp/nginx_proxy_temp;

    server {
        listen 80;
        server_name htsgmthciflwefrippwf.supabase.co;

        #ssl_certificate
        #ssl_certificate_key

        # Allow unlimited body size (Docker layers can be multi-GB)
        client_max_body_size 0;

        # ── BUG 3 FIX ─────────────────────────────────────────────
        # Supabase rejects PutObject with a missing body.
        # Only applies to non-multipart PUTs (e.g., marker files, .lock).
        # Skip the read_body() cost for UploadPart — they always have a body.
        # ──────────────────────────────────────────────────────────
        rewrite_by_lua_block {
            if ngx.req.get_method() == "PUT" then
                local args = ngx.req.get_uri_args()
                if not args["partNumber"] then
                    ngx.req.read_body()
                    local body = ngx.req.get_body_data()
                    if not body then
                        local file = ngx.req.get_body_file()
                        if not file then
                            ngx.req.set_body_data("")
                            ngx.req.set_header("Content-Length", "0")
                        end
                    end
                end
            end
        }

        # ── ROUTE 1: Multipart UploadPart — STREAMING PATH ────────
        # Docker sends: PUT /storage/v1/s3/{bucket}/blobs/sha256:xxx?partNumber=N&uploadId=xxx
        # These are large binary PUT chunks (up to GB per part).
        # We bypass all disk buffering and stream bytes directly to Supabase.
        # No XML sub_filter needed (response is just an ETag header).
        # Uses a regex to match the ?partNumber= query arg via URI.
        # ──────────────────────────────────────────────────────────
        location ~ "^/storage/v1/s3/.+\?.*partNumber=" {
            # STREAMING: pass request body bytes directly upstream as they arrive
            proxy_request_buffering off;
            proxy_buffering off;

            
            proxy_pass https://htsgmthciflwefrippwf.supabase.co;
            proxy_ssl_server_name on;
            proxy_ssl_name htsgmthciflwefrippwf.supabase.co;
            proxy_set_header Host htsgmthciflwefrippwf.supabase.co;
            proxy_set_header Accept-Encoding "";
            proxy_pass_request_headers on;
            proxy_pass_request_body on;
            # Keepalive: reuse TLS conn between parts (~150ms saved per part)
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── ROUTE 2: Bucket-level operations ──────────────────────
        # Matches exactly: /storage/v1/s3/{bucket}
        # Handles: DeleteObjects (intercepted), CreateBucket, ListMultipartUploads
        # ──────────────────────────────────────────────────────────
        location ~ "^/storage/v1/s3/([^/]+)$" {
            set $bucket_name $1;

            # BUG 2 FIX: Supabase rejects bulk DeleteObjects with 400.
            # Intercept and return fake success — registry cleanup doesn't hang.
            access_by_lua_block {
                local method = ngx.req.get_method()
                local args = ngx.req.get_uri_args()
                if method == "POST" and args["delete"] ~= nil then
                    ngx.req.read_body()
                    local body = ngx.req.get_body_data() or ""
                    local resp = '<?xml version="1.0" encoding="UTF-8"?>'
                    resp = resp .. '<DeleteResult xmlns="http://s3.amazonaws.com/doc/2006-03-01/">'
                    for key in body:gmatch("<Key>(.-)</Key>") do
                        resp = resp .. '<Deleted><Key>' .. key .. '</Key></Deleted>'
                    end
                    resp = resp .. '</DeleteResult>'
                    ngx.status = 200
                    ngx.header["Content-Type"] = "application/xml"
                    ngx.print(resp)
                    return ngx.exit(200)
                end
            }

            
            proxy_pass https://htsgmthciflwefrippwf.supabase.co;
            proxy_ssl_server_name on;
            proxy_ssl_name htsgmthciflwefrippwf.supabase.co;
            proxy_set_header Host htsgmthciflwefrippwf.supabase.co;
            proxy_set_header Accept-Encoding "";
            proxy_pass_request_headers on;
            proxy_pass_request_body on;
            proxy_request_buffering on;
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 16 128k;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # BUG 1 FIX: Empty XML tags crash the Go AWS SDK v1 parser.
            sub_filter_types application/xml text/xml;
            sub_filter_once off;
            sub_filter '<PartNumberMarker/>' '<PartNumberMarker>0</PartNumberMarker>';
            sub_filter '<NextPartNumberMarker/>' '<NextPartNumberMarker>0</NextPartNumberMarker>';
            sub_filter '<EncodingType/>' '<EncodingType></EncodingType>';
            sub_filter '<Delimiter/>' '<Delimiter></Delimiter>';
            sub_filter '<KeyMarker/>' '<KeyMarker></KeyMarker>';
            sub_filter '<UploadIdMarker/>' '<UploadIdMarker></UploadIdMarker>';
            sub_filter '<NextKeyMarker/>' '<NextKeyMarker></NextKeyMarker>';
            sub_filter '<NextUploadIdMarker/>' '<NextUploadIdMarker></NextUploadIdMarker>';
            sub_filter '<Prefix/>' '<Prefix></Prefix>';
            sub_filter '<ContinuationToken/>' '<ContinuationToken></ContinuationToken>';
        }

        # ── ROUTE 3: All other S3 object paths ────────────────────
        # GetObject, PutObject (non-multipart), CompleteMultipartUpload,
        # AbortMultipartUpload, ListObjects, HeadObject, etc.
        # These are small enough to buffer safely, and may return XML.
        # ──────────────────────────────────────────────────────────
        location /storage/v1/s3/ {
            
            proxy_pass https://htsgmthciflwefrippwf.supabase.co;
            proxy_ssl_server_name on;
            proxy_ssl_name htsgmthciflwefrippwf.supabase.co;
            proxy_set_header Host htsgmthciflwefrippwf.supabase.co;
            proxy_set_header Accept-Encoding "";
            proxy_pass_request_headers on;
            proxy_pass_request_body on;
            proxy_request_buffering on;
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 16 128k;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # BUG 1 FIX
            sub_filter_types application/xml text/xml;
            sub_filter_once off;
            sub_filter '<PartNumberMarker/>' '<PartNumberMarker>0</PartNumberMarker>';
            sub_filter '<NextPartNumberMarker/>' '<NextPartNumberMarker>0</NextPartNumberMarker>';
            sub_filter '<EncodingType/>' '<EncodingType></EncodingType>';
            sub_filter '<Delimiter/>' '<Delimiter></Delimiter>';
            sub_filter '<KeyMarker/>' '<KeyMarker></KeyMarker>';
            sub_filter '<UploadIdMarker/>' '<UploadIdMarker></UploadIdMarker>';
            sub_filter '<NextKeyMarker/>' '<NextKeyMarker></NextKeyMarker>';
            sub_filter '<NextUploadIdMarker/>' '<NextUploadIdMarker></NextUploadIdMarker>';
            sub_filter '<Prefix/>' '<Prefix></Prefix>';
            sub_filter '<ContinuationToken/>' '<ContinuationToken></ContinuationToken>';
        }
    }
}
