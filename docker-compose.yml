# ============================================================
# Click-Deploy — Production Docker Compose
# ============================================================
# Runs the entire Click-Deploy PaaS platform:
#   - PostgreSQL database
#   - Click-Deploy web app (Next.js)
#
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. docker compose up -d
#   3. Open http://your-server:3000
#
# For SSL, put a reverse proxy (Caddy/nginx) in front on port 443.
# ============================================================

services:


  # ── Database Migrations (init — runs once and exits) ────────
  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
      args:
        GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-unknown}
    container_name: click-deploy-migrate
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
    working_dir: /app/packages/database
    command: ["sh", "-c", "npx drizzle-kit push --force && ([ -f /app/scripts/post-migrate.sh ] && sh /app/scripts/post-migrate.sh || true)"]
    restart: "no"

  # ── Click-Deploy Web App ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-unknown}
    container_name: click-deploy-app
    restart: unless-stopped
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}

      # Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}

      # GitHub OAuth (optional)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}

      # SSH key encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env}

      # GitHub webhook verification
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}

      # Cloudflare (optional)
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}

      NODE_ENV: production


