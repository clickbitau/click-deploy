# ============================================================
# Click-Deploy — Production Docker Compose
# ============================================================
# Runs the entire Click-Deploy PaaS platform.
#
# Two database modes:
#   1. LOCAL (default): A bundled PostgreSQL container runs alongside
#      the app. No external database needed. Just `docker compose up -d`.
#   2. EXTERNAL: Point DATABASE_URL to any PostgreSQL (Supabase, Neon,
#      RDS, etc.) and start without the local db:
#        docker compose up -d --scale db=0
#      or simply remove/comment the db service below.
#
# Usage:
#   1. Run ./install.sh or copy .env.example to .env and fill in values
#   2. docker compose up -d
#   3. Open http://your-server:3000
# ============================================================

services:
  # ── PostgreSQL (bundled — only starts with local-db profile) ─────
  # Fresh installs use this by default. External DB users skip it.
  # Start with: COMPOSE_PROFILES=local-db docker compose up -d
  db:
    image: postgres:16-alpine
    container_name: click-deploy-db
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clickdeploy}
      POSTGRES_USER: ${POSTGRES_USER:-clickdeploy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - click-deploy-db:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clickdeploy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Database Migrations (init — runs once and exits) ────────
  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
      args:
        GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-unknown}
    container_name: click-deploy-migrate
    depends_on:
      db:
        condition: service_healthy
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-clickdeploy}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-clickdeploy}}
    working_dir: /app/packages/database
    command: ["sh", "-c", "npx drizzle-kit push --force && ([ -f /app/scripts/post-migrate.sh ] && sh /app/scripts/post-migrate.sh || true)"]
    restart: "no"

  # ── Click-Deploy Web App ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-unknown}
    container_name: click-deploy-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
        required: false
      db-migrate:
        condition: service_completed_successfully
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Database — defaults to local db service; override with external URL
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-clickdeploy}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-clickdeploy}}

      # Supabase Realtime (optional — only needed for external Supabase DB)
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}

      # Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}

      # GitHub OAuth (optional)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}

      # SSH key encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env}

      # GitHub webhook verification
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}

      # Cloudflare (optional)
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}

      NODE_ENV: production

volumes:
  click-deploy-db:
    driver: local
