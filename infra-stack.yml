# ============================================================
# Click-Deploy — Infrastructure Docker Swarm Stack
# ============================================================
# This file deploys the supporting infrastructure for Click-Deploy.
# Note: Traefik is deployed in global mode for HA.
# ============================================================

version: '3.8'

networks:
  click-deploy-net:
    external: true

services:
  traefik:
    image: traefik:v2.11
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--log.level=INFO"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=click-deploy-net"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@clickbit.com.au"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    environment:
      DOCKER_API_VERSION: 1.41
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - click-deploy-traefik-certs:/letsencrypt
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    deploy:
      mode: global
    networks:
      - click-deploy-net

  docker-proxy:
    image: nginx:alpine
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      replicas: 1
      placement:
        constraints: [node.hostname == click-deploy]
    networks:
      - click-deploy-net
  s3-proxy:
    image: openresty/openresty:alpine
    volumes:
      - /opt/click-deploy/s3-proxy/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
    deploy:
      replicas: 1
      placement:
        constraints: [node.hostname == click-deploy]
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.s3proxy.rule=Host(`htsgmthciflwefrippwf.supabase.co`)"
        - "traefik.http.routers.s3proxy.entrypoints=web"
        - "traefik.http.services.s3proxy.loadbalancer.server.port=80"
    networks:
      - click-deploy-net

  registry:
    image: registry:3
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_STORAGE: s3
      REGISTRY_STORAGE_S3_REGIONENDPOINT: http://htsgmthciflwefrippwf.supabase.co/storage/v1/s3
      REGISTRY_STORAGE_S3_ACCESSKEY: ${REGISTRY_STORAGE_S3_ACCESSKEY:?Set REGISTRY_STORAGE_S3_ACCESSKEY in .env}
      REGISTRY_STORAGE_S3_SECRETKEY: ${REGISTRY_STORAGE_S3_SECRETKEY:?Set REGISTRY_STORAGE_S3_SECRETKEY in .env}
      REGISTRY_STORAGE_S3_BUCKET: docker-registry
      REGISTRY_STORAGE_S3_REGION: ap-southeast-2
      REGISTRY_STORAGE_S3_FORCEPATHSTYLE: "true"
      REGISTRY_STORAGE_S3_V4AUTH: "true"
      REGISTRY_STORAGE_S3_SECURE: "false"
      REGISTRY_STORAGE_S3_SKIPVERIFY: "true"
      REGISTRY_STORAGE_REDIRECT_DISABLE: "true"
      REGISTRY_HTTP_SECRET: ${REGISTRY_HTTP_SECRET:-8eff648febc9fe8be11658a132dd9a5ab419b0f202a67416a7fb69b806e216ac}
      REGISTRY_LOG_LEVEL: info
    ports:
      - target: 5000
        published: 5000
        mode: host
    deploy:
      replicas: 1
      placement:
        constraints: [node.hostname == click-deploy]
    extra_hosts:
      - "htsgmthciflwefrippwf.supabase.co:10.10.20.30"
    networks:
      - click-deploy-net

volumes:
  click-deploy-traefik-certs:
    external: true
    name: click-deploy-traefik-certs
